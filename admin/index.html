<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - India Coupon Ext</title>
    <link rel="stylesheet" href="admin.css">
</head>
<body>
    <div class="sidebar">
        <h2>Admin Panel</h2>
        <ul>
            <li class="active" data-view="dashboard">Dashboard</li>
            <li data-view="stores">Managed Stores</li>
            <li data-view="coupons">Active Coupons</li>
            <li data-view="submissions">Submissions <span class="badge">3</span></li>
        </ul>
        <div class="export-div">
            <button id="btn-export">Export CSV</button>
        </div>
    </div>
    
    <div class="main">
        <header>
            <h1>Overview</h1>
        </header>

        <section class="stats">
            <div class="card">
                <h3>Total Stores</h3>
                <p>6</p>
            </div>
            <div class="card">
                <h3>Active Coupons</h3>
                <p>24</p>
            </div>
            <div class="card">
                <h3>Total Votes</h3>
                <p>1,402</p>
            </div>
        </section>

        <section class="dataTable">
            <div class="table-header">
                <h2>Pending User Submissions</h2>
                <button class="btn-primary">+ Add New Coupon</button>
            </div>
            <table>
                <thead>
                    <tr>
                        <th>Domain</th>
                        <th>Code / Title</th>
                        <th>User</th>
                        <th>Date</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>myntra.com</td>
                        <td><strong>SALE20</strong><br><small>20% extra on fashion</small></td>
                        <td>rahul99</td>
                        <td>Today, 10:00 AM</td>
                        <td>
                            <button class="btn-success">Approve</button>
                            <button class="btn-danger">Reject</button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </section>
    </div>
    <script src="admin.js"></script>
</body>
</html>
