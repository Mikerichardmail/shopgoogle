name: Coupon Scraper Pipeline

on:
  schedule:
    - cron: '0 0 * * *'   # Run 1 — 5:30 AM IST
    - cron: '0 6 * * *'   # Run 2 — 11:30 AM IST
    - cron: '0 12 * * *'  # Run 3 — 5:30 PM IST
    - cron: '0 18 * * *'  # Run 4 — 11:30 PM IST
  workflow_dispatch:       # Manual trigger from GitHub UI

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install Dependencies
        run: pip install cloudscraper beautifulsoup4

      - name: Run Scraper AI Script
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python scrape_grabon.py
