name: Coupon Scraper Pipeline

on:
  schedule:
    - cron: '0 0 * * *'   # Run 1 — 5:30 AM IST
    - cron: '0 6 * * *'   # Run 2 — 11:30 AM IST
    - cron: '0 12 * * *'  # Run 3 — 5:30 PM IST
    - cron: '0 18 * * *'  # Run 4 — 11:30 PM IST
  workflow_dispatch:       # Manual trigger from GitHub UI

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write      # Needed to commit scraper state

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/scraper/package-lock.json

      - name: Install Dependencies
        working-directory: ./backend/scraper
        run: npm ci

      - name: Run Scraper AI Script
        working-directory: ./backend/scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node scraper.js

      - name: Commit Scraper State
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add backend/scraper/scraper_state.json || true
          git commit -m "chore: update scraper state [skip ci]" || echo "No changes to commit"
          git push
