name: Daily Coupon Scraper

on:
  schedule:
    # Runs every day at midnight UTC (which is 5:30 AM IST in India)
    - cron: '0 0 * * *'
  workflow_dispatch: # Allows you to click a button in GitHub to run it anytime manually

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install Dependencies
        working-directory: ./backend/scraper
        run: npm install
        
      - name: Run Scraper AI Script
        working-directory: ./backend/scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node scraper.js
